name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-test-push:
    name: Build, Test & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_full: ${{ steps.meta.outputs.image_full }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Compute image metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="sha-${SHORT_SHA}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER}/${REPO}"
          {
            echo "image_tag=${TAG}"
            echo "image_full=${IMAGE}:${TAG}"
            echo "image_base=${IMAGE}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build container image
        run: |
          docker build \
            --tag "${{ steps.meta.outputs.image_full }}" \
            --tag "${{ steps.meta.outputs.image_base }}:latest" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            .

      - name: Push container image
        run: |
          docker push "${{ steps.meta.outputs.image_full }}"
          docker push "${{ steps.meta.outputs.image_base }}:latest"

      - name: Set GHCR package visibility to public
        # GHCR creates packages as private on first push. App Service has no
        # registry credentials, so a private image causes ImagePullUnauthorizedFailure
        # at startup.
        #
        # WHY GITHUB_TOKEN CANNOT DO THIS:
        # GITHUB_TOKEN is a GitHub App installation token (ghs_*) whose /user identity
        # resolves to github-actions[bot], not the repo owner. The package management
        # write endpoint (PATCH /user/packages/...) operates on the *authenticated
        # user's* packages, so it looks for github-actions[bot]'s packages and returns
        # 404. There is no workaround — a token that authenticates as the actual owner
        # is required.
        #
        # PACKAGES_TOKEN must be a classic PAT (write:packages scope) created by the
        # owner of the GHCR namespace (github.repository_owner). Store it as a
        # repository secret named PACKAGES_TOKEN. If absent, a notice is emitted and
        # the package must be made public manually.
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::notice::PACKAGES_TOKEN secret is not set — cannot set package visibility automatically."
            echo "::notice::Go to github.com/${{ github.repository_owner }} → Packages → ${{ github.event.repository.name }} → Package settings and set visibility to Public manually."
            exit 0
          fi

          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          OWNER_TYPE=$(gh api "/users/${OWNER}" --jq '.type' 2>/dev/null || echo "User")
          echo "Account type: ${OWNER_TYPE}"

          if [ "${OWNER_TYPE}" = "Organization" ]; then
            ENDPOINT="/orgs/${OWNER}/packages/container/${REPO}"
          else
            ENDPOINT="/user/packages/container/${REPO}"
          fi

          gh api --method PATCH "${ENDPOINT}" -f visibility=public \
            && echo "Package set to public — App Service can pull without credentials." \
            || echo "::warning::Could not set package visibility. Go to github.com/${OWNER} → Packages → ${REPO} → Package settings and set visibility to Public manually."

  deploy-dev:
    name: Deploy to dev
    needs: build-test-push
    uses: ./.github/workflows/deploy.yml
    with:
      environment: dev
      image_tag: ${{ needs.build-test-push.outputs.image_tag }}
    # Inherit repo-level secrets so the called workflow can use GITHUB_TOKEN for OIDC.
    secrets: inherit
