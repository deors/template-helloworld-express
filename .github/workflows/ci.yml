name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-test-push:
    name: Build, Test & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_full: ${{ steps.meta.outputs.image_full }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Compute image metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="sha-${SHORT_SHA}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER}/${REPO}"
          {
            echo "image_tag=${TAG}"
            echo "image_full=${IMAGE}:${TAG}"
            echo "image_base=${IMAGE}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          # Use the host Docker daemon so it inherits the credentials written by
          # docker/login-action.  The default docker-container driver runs BuildKit
          # in an isolated container that never sees ~/.docker/config.json, which
          # causes permission_denied: write_package even when packages: write is set.
          driver: docker

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ${{ steps.meta.outputs.image_full }}
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy-dev:
    name: Deploy to dev
    needs: build-test-push
    uses: ./.github/workflows/deploy.yml
    with:
      environment: dev
      image_tag: ${{ needs.build-test-push.outputs.image_tag }}
    # Inherit repo-level secrets so the called workflow can use GITHUB_TOKEN for OIDC.
    secrets: inherit
