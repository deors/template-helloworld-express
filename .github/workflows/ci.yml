name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-test-push:
    name: Build, Test & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_full: ${{ steps.meta.outputs.image_full }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Compute image metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="sha-${SHORT_SHA}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER}/${REPO}"
          {
            echo "image_tag=${TAG}"
            echo "image_full=${IMAGE}:${TAG}"
            echo "image_base=${IMAGE}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build container image
        run: |
          docker build \
            --tag "${{ steps.meta.outputs.image_full }}" \
            --tag "${{ steps.meta.outputs.image_base }}:latest" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            .

      - name: Push container image
        run: |
          docker push "${{ steps.meta.outputs.image_full }}"
          docker push "${{ steps.meta.outputs.image_base }}:latest"

      - name: Set GHCR package visibility to public
        # GHCR creates packages as private on first push.  App Service has no
        # registry credentials, so a private image causes ImagePullUnauthorizedFailure
        # at startup.  We make it public immediately after pushing so the Web App
        # can always pull without extra credentials.
        #
        # The API endpoint differs for user vs organisation accounts.
        # GITHUB_TOKEN with packages:write is sufficient for both when the
        # package was just created by this workflow.  A soft warning is emitted
        # if the call fails so the run doesn't fail here — check the package
        # settings manually in that case.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          OWNER_TYPE=$(gh api "/users/${OWNER}" --jq '.type' 2>/dev/null || echo "User")
          echo "Account type: ${OWNER_TYPE}"

          if [ "${OWNER_TYPE}" = "Organization" ]; then
            ENDPOINT="/orgs/${OWNER}/packages/container/${REPO}"
          else
            ENDPOINT="/user/packages/container/${REPO}"
          fi

          gh api --method PATCH "${ENDPOINT}" -f visibility=public \
            && echo "Package set to public — App Service can pull without credentials." \
            || echo "::warning::Could not set package visibility automatically. Go to github.com/${OWNER}/${REPO} → Packages → ${REPO} → Package settings and set visibility to Public manually."

  deploy-dev:
    name: Deploy to dev
    needs: build-test-push
    uses: ./.github/workflows/deploy.yml
    with:
      environment: dev
      image_tag: ${{ needs.build-test-push.outputs.image_tag }}
    # Inherit repo-level secrets so the called workflow can use GITHUB_TOKEN for OIDC.
    secrets: inherit
