name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: Target environment (dev | staging | prod)
        type: string
        required: true
      image_tag:
        description: Container image tag to deploy (e.g. sha-abc1234)
        type: string
        required: true

jobs:
  deploy:
    name: Deploy ${{ inputs.image_tag }} → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve image reference
        id: image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "ref=ghcr.io/${OWNER}/${REPO}:${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Update Web App container image
        run: |
          az webapp config container set \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name            "${{ vars.AZURE_WEBAPP_NAME }}" \
            --container-image-name "${{ steps.image.outputs.ref }}"

      - name: Set runtime environment variables
        run: |
          az webapp config appsettings set \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name            "${{ vars.AZURE_WEBAPP_NAME }}" \
            --settings \
              APP_ENV="${{ inputs.environment }}" \
              IMAGE_TAG="${{ inputs.image_tag }}" \
              APP_NAME="${{ github.event.repository.name }}"

      - name: Restart Web App
        run: |
          az webapp restart \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name            "${{ vars.AZURE_WEBAPP_NAME }}"

      # -----------------------------------------------------------------------
      # Validation strategy differs by environment network exposure:
      #
      #   dev     — public endpoint is open (public_network_access_enabled=true
      #             in Terraform).  Poll /health over HTTPS from the runner.
      #
      #   staging / prod — private-endpoint-only (public_network_access_enabled
      #             =false).  The public hostname is unreachable from GitHub-
      #             hosted runners, so we use control-plane assertions instead:
      #               • az webapp show   → App Service state == Running
      #               • az webapp config container show → linuxFxVersion contains
      #                 the expected image tag
      #
      # See docs/SETUP.md § "Deploy validation strategy" for full rationale.
      # To use HTTP validation against staging/prod, provision self-hosted runners
      # inside the VNet and remove the environment condition below.
      # -----------------------------------------------------------------------

      - name: Validate – HTTP smoke test (dev)
        if: inputs.environment == 'dev'
        run: |
          WEBAPP_URL="https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          echo "Smoke-testing ${WEBAPP_URL}/health …"

          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              "${WEBAPP_URL}/health" || echo "000")
            echo "  attempt ${i}: HTTP ${STATUS}"
            if [ "${STATUS}" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            sleep 10
          done

          echo "Health check timed out after 3 minutes."
          exit 1

      - name: Validate – control-plane assertions (staging / prod)
        if: inputs.environment != 'dev'
        run: |
          echo "=== App Service state ==="
          STATE=$(az webapp show \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name            "${{ vars.AZURE_WEBAPP_NAME }}" \
            --query state -o tsv)
          echo "State: ${STATE}"
          [[ "${STATE}" == "Running" ]] \
            || { echo "::error::App not Running (state=${STATE})"; exit 1; }

          echo "=== Deployed image tag ==="
          IMG=$(az webapp config container show \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name            "${{ vars.AZURE_WEBAPP_NAME }}" \
            --query linuxFxVersion -o tsv)
          echo "linuxFxVersion: ${IMG}"
          grep -q "${{ inputs.image_tag }}" <<<"${IMG}" \
            || { echo "::error::Deployed image (${IMG}) does not contain expected tag (${{ inputs.image_tag }})"; exit 1; }

          echo "Control-plane validation passed."

      - name: Confirm deployed version
        run: |
          WEBAPP_URL="https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          echo "Deployed image : ${{ steps.image.outputs.ref }}"
          echo "App URL        : ${WEBAPP_URL}"
          echo "Whois endpoint : ${WEBAPP_URL}/whois"
